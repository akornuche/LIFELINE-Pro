name: Android Build

on:
  # Build APK/AAB whenever android/** changes on main
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [release, debug]

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew
        shell: bash

      # ── Decode signing keystore from GitHub Secret ─────────────────────────
      # Store the keystore as a base64 secret in GitHub:
      #   cat android-signing-key.keystore | base64 | pbcopy
      # Then add as: Settings → Secrets → ANDROID_KEYSTORE_BASE64
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/android-signing-key.keystore

      # ── Build release AAB ──────────────────────────────────────────────────
      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── Also build a debug APK for quick testing ───────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: lifeline-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lifeline-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build summary
        run: |
          echo "## Android Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`lifeline-release-aab\` | Upload to Google Play Store |" >> $GITHUB_STEP_SUMMARY
          echo "| \`lifeline-debug-apk\` | Install directly for testing |" >> $GITHUB_STEP_SUMMARY
