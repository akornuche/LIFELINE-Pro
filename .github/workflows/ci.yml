name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel any in-progress run on the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Unit tests ─────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_OPTIONS: --experimental-vm-modules
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npx jest --testPathPattern=tests/unit --forceExit

  # ── Job 2: SQLite integration tests ──────────────────────────────────────────
  sqlite-integration:
    name: SQLite integration
    runs-on: ubuntu-latest
    needs: [unit]
    defaults:
      run:
        working-directory: backend
    env:
      NODE_OPTIONS: --experimental-vm-modules
      NODE_ENV: test
      DB_TYPE: sqlite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: SQLite integration tests
        run: npx jest --testPathPattern=tests/integration --testPathIgnorePatterns="adapter.contract.pg|pg.boolean.roundtrip" --forceExit

  # ── Job 3: PostgreSQL adapter contract tests ─────────────────────────────────
  pg-contract:
    name: PostgreSQL contract
    runs-on: ubuntu-latest
    needs: [unit]
    defaults:
      run:
        working-directory: backend
    env:
      NODE_OPTIONS: --experimental-vm-modules
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: PostgreSQL contract tests (testcontainers)
        run: npx jest --testPathPattern=adapter.contract.pg --forceExit

  # ── Job 4: Playwright E2E tests ───────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [unit]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify clean backend startup
        run: |
          node ../backend/scripts/e2e-server.js &
          BACKEND_PID=$!
          for i in {1..30}; do
            if curl -s http://localhost:5002/ping > /dev/null 2>&1; then
              echo "[CI] Backend health check passed"
              kill $BACKEND_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "[CI] Backend health check failed after 30s"
          kill $BACKEND_PID 2>/dev/null || true
          exit 1
        shell: bash

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Job 5: Security audit (non-blocking) ─────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: [unit]
    defaults:
      run:
        working-directory: backend
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit (informational)
        run: npm audit --audit-level=high || true
