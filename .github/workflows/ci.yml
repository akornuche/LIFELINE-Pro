name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel any in-progress run on the same branch when a new push arrives.
# This is the primary fix for minute consumption — stale runs are killed immediately.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Unit tests (fast, always runs, no Docker) ─────────────────────────
  # Target: < 30 seconds. Fails fast on logic regressions.
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

  # ── Job 2: SQLite integration tests ──────────────────────────────────────────
  # Runs full integration suite against SQLite (no Docker needed).
  # Excludes PG-only tests (handled by pg-contract job).
  sqlite-integration:
    name: SQLite integration
    runs-on: ubuntu-latest
    needs: [unit]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: SQLite integration tests
        run: npm run test:sqlite -- --testPathIgnorePatterns=adapter.contract.pg pg.boolean.roundtrip
        # Skips PG-specific tests that need Docker

  # ── Job 3: PostgreSQL adapter contract tests ─────────────────────────────────
  # Requires Docker. Spins up postgres:16-alpine via testcontainers.
  # Only runs when unit tests pass (saves minutes on bad commits).
  pg-contract:
    name: PostgreSQL contract
    runs-on: ubuntu-latest
    needs: [unit]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: PostgreSQL contract tests (testcontainers)
        run: npm run test:contracts:pg

  # ── Job 4: Playwright E2E tests ───────────────────────────────────────────────
  # Runs browser flows against a live SQLite backend + Vite frontend.
  # Only runs when unit tests pass.
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [unit]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify clean backend startup
        run: |
          node ../backend/scripts/e2e-server.js &
          BACKEND_PID=$!
          for i in {1..30}; do
            if curl -s http://localhost:5002/ping > /dev/null 2>&1; then
              echo "[CI] Backend health check passed"
              kill $BACKEND_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "[CI] Backend health check failed after 30s"
          kill $BACKEND_PID 2>/dev/null || true
          exit 1
        shell: bash

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Job 5: Security audit (non-blocking, informational) ──────────────────────
  # Reports vulnerabilities but does NOT fail the pipeline.
  # Reason: 40 known vulns in transitive deps — fixing them all before launch
  # is not realistic. Track them here; fix before major releases.
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: [unit]
    defaults:
      run:
        working-directory: backend
    continue-on-error: true  # informational only — never blocks merge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit (informational)
        run: npm audit --audit-level=high || true
        # Only report HIGH/CRITICAL to reduce noise.
        # || true means exit 0 regardless — audit result is visible in logs.
