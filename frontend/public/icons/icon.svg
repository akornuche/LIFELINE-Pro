<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#gradient)"/>
  
  <!-- Medical Cross -->
  <g transform="translate(256, 256)">
    <!-- Vertical bar -->
    <rect x="-40" y="-140" width="80" height="280" fill="white" rx="10"/>
    <!-- Horizontal bar -->
    <rect x="-140" y="-40" width="280" height="80" fill="white" rx="10"/>
  </g>
  
  <!-- Heart symbol (bottom right highlight) -->
  <g transform="translate(380, 360) scale(0.5)">
    <path d="M 0,-20 C -10,-30 -25,-30 -35,-20 C -45,-10 -45,5 -35,15 L 0,50 L 35,15 C 45,5 45,-10 35,-20 C 25,-30 10,-30 0,-20 Z" 
          fill="#EF4444" 
          opacity="0.9"/>
  </g>
</svg>
