apply plugin: 'com.android.application'

android {
    compileSdkVersion 34
    namespace "com.lifelinepro.app"

    defaultConfig {
        applicationId "com.lifelinepro.app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    signingConfigs {
        release {
            storeFile file("${rootProject.projectDir}/android-signing-key.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: "LifeLine2026!"
            keyAlias "android"
            keyPassword System.getenv("KEY_PASSWORD") ?: "LifeLine2026!"
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
}

dependencies {
    // Trusted Web Activity support
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
